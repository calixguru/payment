<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calixguru Payment</title>
<link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
<style>
    body { font-family: 'Baloo 2', cursive; background-color: #3f4170; }
    .app-button-primary { padding: 1rem 2rem; border-radius: 0.5rem; color: white; font-weight: 700; }
</style>
</head>
<body>
<section class="py-12 text-center text-white">
    <h2 class="text-4xl font-extrabold mb-8">CALIXGURU PAYMENT</h2>
    <p class="text-lg mb-4">Click below to finish up payment</p>
    <p class="text-orange-500 font-bold">Email: <span id="email"></span></p>
    <p class="text-orange-500 font-bold">Amount: <span id="amount"></span></p>
    <button onclick="payWithPaystack()" class="app-button-primary bg-orange-500 mt-4">
        Continue to Pay
    </button>
</section>

<script>
    // Extract URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || '';
    const amount = urlParams.get('amount') || '0';
    const reason = urlParams.get('reason') || '';
    const ref = urlParams.get('ref') || '';

    // Display email and amount
    document.getElementById('email').textContent = email;
    document.getElementById('amount').textContent = `₦${amount}`;

    function payWithPaystack() {
        // Force reference to string
        const customRef = String(ref);

        const handler = PaystackPop.setup({
            key: 'pk_live_008159524c1237cf3094bc3db1ae0a5d8b4ce068',
            email: email,
            amount: parseInt(amount) * 100, // convert to kobo
            currency: 'NGN',
            reference: customRef, // Pass your exact alphanumeric ref
            callback: function(response) {
                // Use your original reference and Paystack reference
                window.location.href = `https://calixguru.pythonanywhere.com/verify-payment/?ref=${customRef}&email=${email}&amount=${amount}&reason=${reason}&pref=${response.reference}`;
            },
            onClose: function() {
                Swal.fire({
                    icon: 'warning',
                    title: 'Payment Cancelled',
                    text: 'You cancelled the payment process.',
                    confirmButtonText: 'Ok',
                    confirmButtonColor: '#4CAF50'
                });
            }
        });
        handler.openIframe();
    }
</script>
</body>
</html>
