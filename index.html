<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Payment | Calixguru</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
    font-family: 'Baloo 2', cursive;
    background: linear-gradient(135deg, #1e293b, #312e81);
}

/* subtle glow */
.glow {
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
}

/* button hover animation */
.btn-pay {
    transition: all 0.3s ease;
}
.btn-pay:hover {
    transform: translateY(-2px) scale(1.01);
}

/* glass effect */
.glass {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.08);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-lg">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white tracking-wide">
            CALIXGURU
        </h1>
        <p class="text-gray-300 text-sm mt-1">
            Secure Payment Portal
        </p>
    </div>

    <!-- Card -->
    <div class="glass glow rounded-3xl p-8 border border-white/10">

        <!-- Title -->
        <h2 class="text-2xl font-bold text-white text-center mb-2">
            Complete Your Payment
        </h2>

        <p class="text-gray-300 text-center text-sm mb-6">
            Please finish your payment and return automatically
        </p>

        <!-- Amount -->
        <div class="bg-white/10 rounded-2xl p-5 text-center mb-6 border border-white/10">
            <p class="text-sm text-gray-300 mb-1">Amount to Pay</p>
            <h3 id="amountDisplay" class="text-3xl font-extrabold text-orange-400">
                ₦0
            </h3>
        </div>

        <!-- Button -->
        <button onclick="payWithPaystack()" 
            class="btn-pay w-full py-4 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-bold text-lg shadow-lg">
            Proceed to Payment
        </button>

        <!-- Notice -->
        <p class="text-center text-xs text-gray-400 mt-4">
            You’ll be redirected to a secure Paystack page
        </p>

        <!-- Back -->
        <p onclick="goBack()" 
            class="text-center mt-6 text-sm text-gray-300 cursor-pointer hover:text-white">
            Cancel and return
        </p>

    </div>

    <!-- Footer -->
    <p class="text-center text-gray-400 text-xs mt-6">
        Powered by Calixguru • Secure Transactions
    </p>

</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {

      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get('email') || '';
      const amount = urlParams.get('amount') || '';
      const reason = urlParams.get('reason') || '';
      const ref = urlParams.get('ref') || '';

      const amountEl = document.getElementById('amountDisplay');
      if (amountEl) {
          amountEl.textContent = `₦${amount}`;
      }

      window.payWithPaystack = function () {
          if (!email || !amount) {
              Swal.fire("Error", "Missing payment details", "error");
              return;
          }

          const handler = PaystackPop.setup({
              key: 'pk_live_008159524c1237cf3094bc3db1ae0a5d8b4ce068',
              email: email,
              amount: parseInt(amount) * 100,
              currency: 'NGN',

              metadata: {
                  custom_fields: [{
                      display_name: "Custom_reference",
                      variable_name: "cref",
                      value: ref
                  },
                     {
                      display_name: "Reason",
                      variable_name: "reason",
                      value: reason
                  },            ]
              },

              callback: function(response) {
                  window.location.href = `https://calixguru.pythonanywhere.com/verify-payment/?pref=${response.reference}&ref=${ref}&email=${email}&amount=${amount}&reason=${reason}`;
              },

              onClose: function () {
                  Swal.fire({
                      icon: 'warning',
                      title: 'Payment Cancelled',
                      text: 'You cancelled the payment process'
                  });
              }
          });

          handler.openIframe();
      };

      window.goBack = function () {
          window.location.href = `https://calixguru.pythonanywhere.com/payment-cancelled`;
      };

  });
</script>

</body>
</html>
